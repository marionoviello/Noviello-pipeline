<!-- wp:html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{titulo} · Noviello Advocacia</title>
<meta name="description" content="{meta_description}">
<link rel="canonical" href="{canonical_url}">
<meta property="og:type" content="article">
<meta property="og:title" content="{titulo}">
<meta property="og:description" content="{meta_description}">
<meta property="og:image" content="{og_image}">
<meta property="og:url" content="{canonical_url}">
<meta property="og:site_name" content="Noviello Advocacia">
<meta property="article:author" content="Dr. Mario Noviello">
<meta property="article:published_time" content="{data_iso}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{titulo}">
<meta name="twitter:description" content="{meta_description}">
<meta name="twitter:image" content="{og_image}">
<script type="application/ld+json">
{json_ld}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500;1,600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* #BrandLockProtocol — allowlist FECHADA. Validar com scripts/brandlock.py */
  :root{
    --claret: #68192E; --cosmos: #540D1D; --anti-flash: #F1F3F2; --white: #FFFFFF;
    --ink: #1A1A1A; --ink-soft: #444444;
    --claret-tint: rgba(104,25,46,.045); --claret-line: rgba(104,25,46,.14);
  }

  /* ===== Wrapper ===== */
  .noviello-artigo{
    max-width:820px;margin:48px auto;padding:0;background:var(--white);border-radius:4px;
    box-shadow:0 2px 24px rgba(104,25,46,.06);
    font-family:'Poppins',system-ui,-apple-system,sans-serif;font-weight:400;
    line-height:1.7;font-size:17px;color:var(--ink);overflow:hidden;
  }

  /* ===== Hero ===== */
  .noviello-artigo .hero{
    background:linear-gradient(180deg,var(--claret) 0%,var(--cosmos) 100%);
    color:var(--anti-flash);padding:48px 60px 50px;text-align:center;position:relative;
  }
  .noviello-artigo .hero.com-imagem{background-size:cover;background-position:center;background-blend-mode:multiply}
  .noviello-artigo .hero.com-imagem::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(104,25,46,.88) 0%,rgba(84,13,29,.94) 100%);z-index:0}
  .noviello-artigo .hero>*{position:relative;z-index:1}
  .noviello-artigo .meta-header{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;font-family:'Poppins',sans-serif;font-size:12px;color:var(--anti-flash);letter-spacing:.8px;margin-bottom:22px}
  .noviello-artigo .meta-header .chip{display:inline-block;background:transparent;color:var(--anti-flash);border:1px solid var(--anti-flash);padding:3px 12px;border-radius:999px;font-weight:600;text-transform:uppercase;letter-spacing:1px;font-size:11px}
  .noviello-artigo .meta-header .sep{opacity:.6}
  .noviello-artigo .hero .eyebrow{font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--anti-flash);margin-bottom:16px}
  .noviello-artigo .hero h1{font-family:'Cinzel',serif;font-weight:600;font-size:34px;line-height:1.25;margin:0 0 18px;color:var(--anti-flash)}
  .noviello-artigo .hero .lead{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:21px;line-height:1.5;max-width:640px;margin:0 auto;color:var(--anti-flash)}
  .noviello-artigo .hero .ruler{width:60px;height:2px;background:var(--anti-flash);margin:22px auto}

  /* ===== Corpo ===== */
  .noviello-artigo .corpo{padding:50px 60px}

  /* ===== Sumario ===== */
  .noviello-artigo .toc{background:var(--claret-tint);border-left:4px solid var(--claret);padding:22px 28px;margin:0 0 40px;border-radius:0 4px 4px 0}
  .noviello-artigo .toc-titulo{font-family:'Cinzel',serif;font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--claret);margin:0 0 12px}
  .noviello-artigo .toc ol{margin:0;padding-left:22px;font-size:15px}
  .noviello-artigo .toc li{margin:0 0 6px}
  .noviello-artigo .toc a{color:var(--ink);text-decoration:none}
  .noviello-artigo .toc a:hover{color:var(--claret);text-decoration:underline}

  /* ===== Tipografia ===== */
  .noviello-artigo h2{font-family:'Cinzel',serif;font-weight:600;color:var(--claret);font-size:26px;line-height:1.3;margin:56px 0 20px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--claret);padding-bottom:12px}
  .noviello-artigo h2:first-child{margin-top:0}
  .noviello-artigo h3{font-family:'Poppins',sans-serif;font-weight:600;color:var(--cosmos);font-size:20px;margin:36px 0 14px}
  .noviello-artigo p{margin:0 0 20px}
  .noviello-artigo strong{color:var(--cosmos);font-weight:600}
  .noviello-artigo em{color:var(--ink-soft)}
  .noviello-artigo a{color:var(--claret);text-decoration:underline;text-decoration-color:var(--claret-line);text-underline-offset:3px}
  .noviello-artigo a:hover{color:var(--cosmos)}
  .noviello-artigo .corpo>p:first-of-type::first-letter,.noviello-artigo .corpo>.toc+p::first-letter{font-family:'Cinzel',serif;font-weight:700;font-size:64px;float:left;line-height:.9;margin:6px 8px 0 0;color:var(--claret)}
  .noviello-artigo ul,.noviello-artigo ol{margin:0 0 20px;padding-left:26px}
  .noviello-artigo li{margin:0 0 10px}
  .noviello-artigo ul li::marker{color:var(--claret)}

  /* ===== Passos numerados ===== */
  .noviello-artigo ol.passos{list-style:none;padding:0;margin:32px 0;counter-reset:passo}
  .noviello-artigo ol.passos>li{position:relative;padding:20px 24px 20px 84px;margin:0 0 14px;background:var(--claret-tint);border-radius:4px;border-left:3px solid var(--claret);min-height:56px;counter-increment:passo}
  .noviello-artigo ol.passos>li::before{content:counter(passo,decimal-leading-zero);position:absolute;left:20px;top:18px;width:44px;height:44px;background:linear-gradient(135deg,var(--claret) 0%,var(--cosmos) 100%);color:var(--anti-flash);font-family:'Cinzel',serif;font-weight:700;font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:50%;box-shadow:0 2px 6px rgba(104,25,46,.18)}
  .noviello-artigo ol.passos>li>strong:first-child,.noviello-artigo ol.passos>li>p:first-child>strong:first-child{display:block;font-family:'Poppins',sans-serif;font-size:16px;color:var(--cosmos);margin-bottom:4px}
  .noviello-artigo ol.passos>li p{margin:0}

  /* ===== Checklist (marcador quadrado claret) ===== */
  .noviello-artigo ul.checklist{list-style:none;padding:0;margin:24px 0}
  .noviello-artigo ul.checklist>li{position:relative;padding:6px 0 6px 30px;margin:0 0 6px}
  .noviello-artigo ul.checklist>li::before{content:"";position:absolute;left:6px;top:11px;width:8px;height:8px;background:var(--claret);transform:rotate(45deg)}

  /* ===== Card grid ===== */
  .noviello-artigo .card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin:32px 0}
  .noviello-artigo .card-grid .card{background:var(--claret-tint);border-top:3px solid var(--claret);border-radius:4px;padding:20px 22px}
  .noviello-artigo .card-grid .card .card-titulo{font-family:'Cinzel',serif;font-weight:600;font-size:15px;color:var(--claret);margin:0 0 8px;line-height:1.3}
  .noviello-artigo .card-grid .card p{margin:0;font-size:14px;line-height:1.55;color:var(--ink)}

  /* ===== Divisor (sem travessao) ===== */
  .noviello-artigo hr.ornamento{border:none;text-align:center;margin:48px auto;height:2px;width:80px;background:var(--claret)}

  /* ===== Imagens ===== */
  .noviello-artigo figure{margin:32px 0;text-align:center}
  .noviello-artigo figure img{max-width:100%;height:auto;border-radius:4px;box-shadow:0 4px 18px rgba(104,25,46,.12)}
  .noviello-artigo figure figcaption{font-family:'Poppins',sans-serif;font-style:italic;font-size:13px;color:var(--ink-soft);margin-top:10px;line-height:1.5}

  /* ===== Callouts (barra lateral, SEM icone) ===== */
  .noviello-artigo .callout{border-left:4px solid var(--claret);padding:18px 22px;margin:28px 0;border-radius:0 4px 4px 0;font-size:16px}
  .noviello-artigo .callout .titulo{font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;color:var(--claret)}
  .noviello-artigo .callout p:last-child{margin-bottom:0}
  .noviello-artigo .callout-importante{background:var(--claret-tint)}
  .noviello-artigo .callout-atencao{background:var(--anti-flash);border-left-color:var(--cosmos)}
  .noviello-artigo .callout-atencao .titulo{color:var(--cosmos)}
  .noviello-artigo .callout-dica{background:var(--claret-tint)}
  .noviello-artigo .callout-saiba-que{background:var(--claret-tint)}
  .noviello-artigo .callout-exemplo{background:var(--anti-flash);border-left-color:var(--cosmos)}
  .noviello-artigo .callout-exemplo .titulo{color:var(--cosmos)}

  /* ===== Blockquote (Cormorant) ===== */
  .noviello-artigo blockquote{margin:32px 0;padding:24px 32px 24px 56px;position:relative;background:var(--claret-tint);border-radius:4px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:21px;line-height:1.5;color:var(--ink)}
  .noviello-artigo blockquote::before{content:"\201C";position:absolute;top:0;left:16px;font-family:'Cormorant Garamond',serif;font-size:64px;line-height:1;color:var(--claret)}
  .noviello-artigo blockquote cite{display:block;font-family:'Poppins',sans-serif;font-style:normal;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:var(--claret);margin-top:14px}

  /* ===== Tabela ===== */
  .noviello-tabela{width:100%;border-collapse:collapse;margin:26px 0;font-size:15px}
  .noviello-tabela th{background:var(--claret);color:var(--white);font-family:'Poppins',sans-serif;font-weight:600;text-align:left;padding:12px 14px}
  .noviello-tabela td{padding:11px 14px;border-bottom:1px solid var(--claret-line)}
  .noviello-tabela tr.destaque td{background:var(--claret-tint);font-weight:600}

  /* ===== FAQ ===== */
  .noviello-artigo .faq{margin:40px 0 0}
  .noviello-artigo .faq-titulo{font-family:'Cinzel',serif;font-weight:600;color:var(--claret);font-size:22px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--claret);padding-bottom:12px;margin:0 0 24px}
  .noviello-artigo .faq-item{border-bottom:1px solid var(--claret-line);padding:18px 0}
  .noviello-artigo .faq-item:last-child{border-bottom:none}
  .noviello-artigo .faq-item .pergunta{font-family:'Poppins',sans-serif;font-weight:600;font-size:17px;color:var(--cosmos);margin:0 0 10px;line-height:1.4}
  .noviello-artigo .faq-item .resposta{margin:0;color:var(--ink);font-size:16px}

  /* ===== Bio ===== */
  .noviello-artigo .bio-autor{display:flex;gap:22px;margin:48px 0 0;padding:28px;background:var(--anti-flash);border-radius:4px;border-left:4px solid var(--claret)}
  .noviello-artigo .bio-foto{flex-shrink:0;width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--claret) 0%,var(--cosmos) 100%);color:var(--anti-flash);font-family:'Cinzel',serif;font-weight:700;font-size:28px;display:flex;align-items:center;justify-content:center;letter-spacing:1px}
  .noviello-artigo .bio-conteudo h3{font-family:'Cinzel',serif;font-size:18px;color:var(--claret);margin:0 0 4px;text-transform:none;border:none;padding:0;letter-spacing:0}
  .noviello-artigo .bio-cargo{font-family:'Poppins',sans-serif;font-weight:600;font-size:13px;color:var(--ink-soft);margin:0 0 8px;text-transform:uppercase;letter-spacing:.8px}
  .noviello-artigo .bio-descricao{font-size:14px;color:var(--ink);margin:0 0 10px;line-height:1.6}
  .noviello-artigo .bio-contato{font-size:13px;color:var(--ink-soft);margin:0}
  .noviello-artigo .bio-contato a{color:var(--claret);text-decoration:none}
  .noviello-artigo .bio-contato a:hover{text-decoration:underline}

  /* ===== CTA final ===== */
  .noviello-artigo .cta-final{background-image:linear-gradient(135deg,var(--claret) 0%,var(--cosmos) 100%);color:var(--anti-flash);padding:36px 40px;margin:32px 0 0;border-radius:4px;text-align:center}
  .noviello-artigo .cta-final .cta-titulo{font-family:'Cinzel',serif;font-weight:600;font-size:22px;color:var(--anti-flash);margin:0 0 12px}
  .noviello-artigo .cta-final p{color:var(--anti-flash);margin:0 0 22px;font-size:15px}
  .noviello-artigo .cta-final .cta-botao{display:inline-block;background:var(--anti-flash);color:var(--claret);font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;padding:12px 32px;border-radius:999px;text-decoration:none;letter-spacing:.5px;transition:transform .15s}
  .noviello-artigo .cta-final .cta-botao:hover{transform:translateY(-1px)}
  .noviello-artigo .cta-final .cta-contato{display:flex;justify-content:center;flex-wrap:wrap;gap:20px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(104,25,46,.14);font-size:13px;color:var(--anti-flash);letter-spacing:.5px}
  .noviello-artigo .cta-final .cta-contato span{display:inline-flex;align-items:center;gap:6px}
  .noviello-artigo .cta-final .cta-contato a{color:inherit;text-decoration:none}
  .noviello-artigo .cta-final .cta-contato a:hover{color:var(--white);text-decoration:underline}

  /* ===== Tags rodape ===== */
  .noviello-artigo .tags-rodape{margin:36px 0 0;padding:22px 0 0;border-top:1px solid var(--claret-line)}
  .noviello-artigo .tags-rodape-titulo{font-family:'Poppins',sans-serif;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--ink-soft);margin:0 0 12px}
  .noviello-artigo .tags-rodape .tags-lista{display:flex;flex-wrap:wrap;gap:8px}
  .noviello-artigo .tags-rodape .tag{display:inline-block;background:var(--anti-flash);color:var(--ink-soft);font-family:'Poppins',sans-serif;font-size:12px;padding:5px 14px;border-radius:999px;text-decoration:none;letter-spacing:.3px;transition:background .15s,color .15s}
  .noviello-artigo .tags-rodape .tag:hover{background:var(--claret);color:var(--white)}

  /* ===== Disclaimer ===== */
  .noviello-artigo .disclaimer{margin:24px 0 0;padding:16px 20px;background:var(--anti-flash);font-size:13px;color:var(--ink-soft);border-radius:4px;line-height:1.5}
  .noviello-artigo .disclaimer strong{color:var(--ink-soft)}

  /* ===== Mobile ===== */
  @media (max-width:720px){
    .noviello-artigo{margin:16px}
    .noviello-artigo .hero{padding:36px 24px 32px}
    .noviello-artigo .hero h1{font-size:26px}
    .noviello-artigo .corpo{padding:32px 24px}
    .noviello-artigo .corpo>p:first-of-type::first-letter,.noviello-artigo .corpo>.toc+p::first-letter{font-size:48px}
    .noviello-artigo h2{font-size:22px}
    .noviello-artigo .cta-final{padding:28px 22px}
    .noviello-artigo .cta-final .cta-contato{flex-direction:column;gap:8px}
    .noviello-artigo .bio-autor{flex-direction:column;text-align:center}
    .noviello-artigo .bio-foto{margin:0 auto}
  }
</style>
</head>
<body>
<div class="noviello-artigo">
  <header class="hero {hero_class}" {hero_style}>
    <div class="meta-header">
      {categoria_chip}
      <span class="data">{data_publicacao}</span>
      <span class="sep">·</span>
      <span class="tempo-leitura">{tempo_leitura} min de leitura</span>
    </div>
    <div class="eyebrow">{eyebrow}</div>
    <h1>{titulo}</h1>
    <div class="ruler"></div>
    <p class="lead">{lead}</p>
  </header>
  <div class="corpo">
    {toc}
    {conteudo}
    {tags_rodape}
    {bio_autor}
    {cta_final}
    {disclaimer}
  </div>
</div>
</body>
</html>
<!-- /wp:html -->
