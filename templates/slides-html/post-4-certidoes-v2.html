<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Noviello — 4 certidões inegociáveis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --claret: #68192E;
    --chocolate: #540D1D;
    --antiflash: #F1F3F2;
    --black: #1A1A1A;
    --font-headline: 'Cinzel', Georgia, serif;
    --font-body: 'Poppins', -apple-system, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: var(--antiflash);
    font-family: var(--font-body);
    color: var(--black);
    overflow: hidden;
  }
  .canvas {
    position: relative;
    width: 1080px;
    height: 1350px;
    padding: 80px;
    background: var(--antiflash);
  }

  /* Logo oficial — topo central */
  .logo {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: 280px;
    height: auto;
  }
  .logo img { width: 100%; height: auto; display: block; }

  /* Linha decorativa fina sob o logo */
  .divider-top {
    position: absolute;
    top: 235px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 2px;
    background: var(--claret);
    opacity: 0.7;
  }

  /* Eyebrow — categoria */
  .eyebrow {
    position: absolute;
    top: 285px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 18px;
    color: var(--claret);
    letter-spacing: 8px;
    text-transform: uppercase;
  }

  /* Headline editorial em Cinzel */
  .headline {
    position: absolute;
    top: 365px;
    left: 80px;
    right: 80px;
    font-family: var(--font-headline);
    font-weight: 600;
    font-size: 78px;
    line-height: 1.08;
    color: var(--claret);
    letter-spacing: -0.5px;
    text-align: center;
  }
  .headline .line1 { display: block; font-weight: 500; }
  .headline .line2 { display: block; font-weight: 500; }
  .headline .line3 {
    display: block;
    font-weight: 700;
    color: var(--chocolate);
    margin-top: 12px;
  }

  /* Linha decorativa entre headline e body */
  .accent-line {
    position: absolute;
    top: 760px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 2px;
    background: var(--claret);
  }

  /* Body — Poppins, frase de tensão */
  .body {
    position: absolute;
    top: 805px;
    left: 100px;
    right: 100px;
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 32px;
    line-height: 1.45;
    color: var(--black);
    text-align: center;
  }

  /* Footnote técnico — bases normativas */
  .footnote {
    position: absolute;
    top: 920px;
    left: 80px;
    right: 80px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 20px;
    color: var(--claret);
    letter-spacing: 2.5px;
    text-align: center;
    text-transform: uppercase;
    opacity: 0.85;
  }

  /* Selo editorial "4" */
  .stamp {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .stamp-number {
    width: 92px;
    height: 92px;
    border: 2.5px solid var(--claret);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-headline);
    font-weight: 700;
    font-size: 48px;
    color: var(--claret);
  }
  .stamp-label {
    font-family: var(--font-body);
    font-size: 17px;
    font-weight: 500;
    color: var(--claret);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* CTA — barra inferior */
  .cta {
    position: absolute;
    bottom: 80px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-body);
    font-size: 19px;
    color: var(--claret);
  }
  .cta-text {
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .cta-handle {
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 0.5px;
  }

  /* Linha rodapé */
  .footer-line {
    position: absolute;
    bottom: 145px;
    left: 80px;
    right: 80px;
    height: 1px;
    background: var(--claret);
    opacity: 0.25;
  }
</style>
</head>
