<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Noviello — 4 certidões inegociáveis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    background: #F4E8D8;
    font-family: 'Inter', -apple-system, sans-serif;
    color: #3A3A3A;
    overflow: hidden;
  }
  .canvas {
    position: relative;
    width: 1080px;
    height: 1350px;
    padding: 80px;
    background:
      radial-gradient(ellipse at top right, rgba(107, 44, 57, 0.04) 0%, transparent 60%),
      #F4E8D8;
  }
  .logo {
    position: absolute;
    top: 60px;
    right: 80px;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    line-height: 1;
  }
  .logo-mark {
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 44px;
    color: #6B2C39;
    letter-spacing: -1px;
    margin-bottom: 4px;
  }
  .logo-text {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 14px;
    color: #6B2C39;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .ornament {
    position: absolute;
    top: 240px;
    left: 80px;
    width: 60px;
    height: 3px;
    background: #6B2C39;
    border-radius: 2px;
  }
  .eyebrow {
    position: absolute;
    top: 200px;
    left: 80px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: #6B2C39;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  .headline {
    position: absolute;
    top: 320px;
    left: 80px;
    right: 80px;
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 700;
    font-size: 96px;
    line-height: 1.05;
    color: #6B2C39;
    letter-spacing: -2px;
  }
  .headline .line2 { display: block; }
  .headline .line3 {
    display: block;
    font-style: italic;
    font-weight: 600;
  }
  .accent-line {
    position: absolute;
    top: 760px;
    left: 80px;
    width: 120px;
    height: 2px;
    background: #6B2C39;
    opacity: 0.6;
  }
  .body {
    position: absolute;
    top: 810px;
    left: 80px;
    right: 80px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.5;
    color: #3A3A3A;
    font-style: italic;
  }
  .footnote {
    position: absolute;
    top: 990px;
    left: 80px;
    right: 80px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: #6B2C39;
    letter-spacing: 1px;
  }
  .stamp {
    position: absolute;
    left: 80px;
    bottom: 200px;
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .stamp-circle {
    width: 50px;
    height: 50px;
    border: 2px solid #6B2C39;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 28px;
    color: #6B2C39;
  }
  .stamp-label {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    color: #6B2C39;
    font-weight: 500;
    line-height: 1.3;
  }
  .stamp-label strong {
    display: block;
    font-weight: 600;
    font-size: 18px;
  }
  .cta {
    position: absolute;
    bottom: 80px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    color: #6B2C39;
    letter-spacing: 2px;
  }
  .cta-text { text-transform: uppercase; }
  .cta-handle {
    text-align: right;
    text-transform: none;
    letter-spacing: 0;
    font-size: 18px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div class="canvas">

  <div class="logo">
    <div class="logo-mark">N</div>
    <div class="logo-text">Noviello Advocacia</div>
  </div>

  <div class="eyebrow">Direito Imobiliário</div>
  <div class="ornament"></div>

  <h1 class="headline">
    Antes de assinar<br>
    <span class="line2">a compra do imóvel:</span>
    <span class="line3">4 certidões inegociáveis.</span>
  </h1>

  <div class="accent-line"></div>

  <p class="body">
    Pular essa etapa pode custar o imóvel inteiro.
  </p>

  <div class="footnote">
    LRP · CC art. 1.245 · CTN art. 130 · CPC art. 792
  </div>

  <div class="stamp">
    <div class="stamp-circle">4</div>
    <div class="stamp-label">
      <strong>certidões</strong>
      inegociáveis
    </div>
  </div>

  <div class="cta">
    <div class="cta-text">Leia a legenda ↓</div>
    <div class="cta-handle">@novielloadv</div>
  </div>

</div>
</body>
</html>
